version: '3.8'

services:
  db:
    image: postgres:16 # Usaremos la versión más estable
    container_name: facturacion_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123 # Cambia esto luego
      POSTGRES_DB: facturacion_core
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: